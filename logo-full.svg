<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="512" height="512" fill="#0f172a"/>
  
  <!-- Atom/Nucleus -->
  <defs>
    <style>
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
  </defs>
  
  <!-- Orbital paths with gradient -->
  <g transform="translate(256, 180)">
    <!-- Main nucleus circle -->
    <circle cx="0" cy="0" r="45" fill="#4dd9e8"/>
    <circle cx="0" cy="0" r="35" fill="#3dd9d9"/>
    
    <!-- Outer orbital rings -->
    <ellipse cx="0" cy="0" rx="140" ry="85" fill="none" stroke="#4dd9e8" stroke-width="12" opacity="0.9" transform="rotate(-20)"/>
    <ellipse cx="0" cy="0" rx="140" ry="85" fill="none" stroke="#4dd9e8" stroke-width="12" opacity="0.9" transform="rotate(40)"/>
    <ellipse cx="0" cy="0" rx="140" ry="85" fill="none" stroke="#4dd9e8" stroke-width="12" opacity="0.9" transform="rotate(100)"/>
    
    <!-- Electron dots -->
    <circle cx="140" cy="0" r="18" fill="#4dd9e8"/>
    <circle cx="-70" cy="121" r="18" fill="#4dd9e8"/>
    <circle cx="-70" cy="-121" r="18" fill="#4dd9e8"/>
  </g>
  
  <!-- Text: PHYSICS CODE -->
  <text x="256" y="380" font-family="'Arial', 'Helvetica', sans-serif" font-size="86" font-weight="900" fill="#4dd9e8" text-anchor="middle" letter-spacing="3">PHYSICS CODE</text>
  
  <!-- Decorative line -->
  <line x1="100" y1="420" x2="412" y2="420" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
  
  <!-- Text: ACADEMY -->
  <text x="256" y="480" font-family="'Arial', 'Helvetica', sans-serif" font-size="56" font-weight="300" fill="#ffffff" text-anchor="middle" letter-spacing="6">ACADEMY</text>
</svg>