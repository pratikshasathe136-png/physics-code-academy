<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(100, 50)">
    <!-- Nucleus -->
    <circle cx="0" cy="0" r="20" fill="#4dd9e8"/>
    <circle cx="0" cy="0" r="15" fill="#3dd9d9"/>
    
    <!-- Orbital rings -->
    <ellipse cx="0" cy="0" rx="65" ry="40" fill="none" stroke="#4dd9e8" stroke-width="5" opacity="0.85" transform="rotate(-20)"/>
    <ellipse cx="0" cy="0" rx="65" ry="40" fill="none" stroke="#4dd9e8" stroke-width="5" opacity="0.85" transform="rotate(40)"/>
    <ellipse cx="0" cy="0" rx="65" ry="40" fill="none" stroke="#4dd9e8" stroke-width="5" opacity="0.85" transform="rotate(100)"/>
    
    <!-- Electrons -->
    <circle cx="65" cy="0" r="8" fill="#4dd9e8"/>
    <circle cx="-32.5" cy="56" r="8" fill="#4dd9e8"/>
    <circle cx="-32.5" cy="-56" r="8" fill="#4dd9e8"/>
  </g>
</svg>